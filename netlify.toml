[build]
  base    = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

# Proxy /api/* to Railway backend.
# After Railway setup, replace YOUR_RAILWAY_URL with your actual Railway URL,
# e.g. https://project-fly-backend.up.railway.app
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR_RAILWAY_URL/api/:splat"
  status = 200
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
